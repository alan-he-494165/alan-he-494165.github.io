<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Hero background with coding on left and physical organic chemistry on right, clear center">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1120"/>
      <stop offset="50%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <radialGradient id="centerFade" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#111827" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#111827" stop-opacity="0.35"/>
    </radialGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <style>
      .line { stroke: #cbd5e1; stroke-width: 4.5; stroke-linecap: round; }
      .code { fill: #93c5fd; font-family: Menlo, Monaco, Consolas, 'Courier New', monospace; font-size: 24px; }
      .atom { fill: #e2e8f0; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- soft edge glows only, keeping center calm -->
  <ellipse cx="260" cy="250" rx="220" ry="120" fill="#22d3ee" opacity="0.18" filter="url(#blur)"/>
  <ellipse cx="1720" cy="820" rx="260" ry="140" fill="#a78bfa" opacity="0.15" filter="url(#blur)"/>

  <!-- Left coding block kept away from center -->
  <g opacity="0.9">
    <rect x="40" y="220" width="620" height="620" rx="22" fill="#0a1428" stroke="#334155" stroke-width="2.5"/>
    <circle cx="78" cy="258" r="8" fill="#fb7185"/>
    <circle cx="108" cy="258" r="8" fill="#fbbf24"/>
    <circle cx="138" cy="258" r="8" fill="#34d399"/>

    <text x="82" y="330" class="code">def rate(k, Ea, T):</text>
    <text x="102" y="372" class="code">return k * exp(-Ea/(R*T))</text>
    <text x="82" y="438" class="code">data = load_lfer()</text>
    <text x="82" y="480" class="code">rho = fit_hammett(data)</text>
    <text x="82" y="546" class="code">if rho &lt; 0: pathway = 'EDG-favored'</text>
    <text x="82" y="612" class="code">simulate_ts(substrate_set)</text>
    <text x="82" y="678" class="code">plot_energy_profile()</text>
    <text x="82" y="744" class="code">export_results('mechanism.csv')</text>
  </g>

  <!-- Right chemistry motif pushed to edge -->
  <g transform="translate(1665 540)" opacity="0.88">
    <polygon points="0,-175 152,-88 152,88 0,175 -152,88 -152,-88" fill="none" class="line"/>
    <line x1="-122" y1="-70" x2="-122" y2="70" class="line" opacity="0.75"/>
    <line x1="0" y1="140" x2="122" y2="70" class="line" opacity="0.75"/>
    <line x1="0" y1="-140" x2="122" y2="-70" class="line" opacity="0.75"/>

    <line x1="0" y1="-175" x2="0" y2="-248" class="line"/>
    <circle cx="0" cy="-266" r="16" class="atom"/>

    <line x1="152" y1="88" x2="234" y2="138" class="line"/>
    <circle cx="252" cy="149" r="16" class="atom"/>

    <line x1="-152" y1="88" x2="-238" y2="140" class="line"/>
    <circle cx="-256" cy="151" r="14" class="atom"/>
  </g>

  <!-- keep center visually clean for avatar + text -->
  <rect x="640" y="180" width="640" height="620" rx="40" fill="#0f172a" opacity="0.18"/>
  <rect width="1920" height="1080" fill="url(#centerFade)"/>
</svg>
