<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" role="img" aria-label="Coding and physical organic chemistry hero art">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="45%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <style>
      .line { stroke: #cbd5e1; stroke-width: 5; stroke-linecap: round; }
      .atom { fill: #e2e8f0; }
      .code { fill: #93c5fd; font-family: Menlo, Monaco, Consolas, 'Courier New', monospace; font-size: 30px; }
      .small { fill: #a5b4fc; font-family: Menlo, Monaco, Consolas, 'Courier New', monospace; font-size: 26px; }
      .label { fill: #f1f5f9; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 36px; font-weight: 600; letter-spacing: 0.3px; }
      .sub { fill: #cbd5e1; font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 29px; }
    </style>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <ellipse cx="420" cy="220" rx="260" ry="120" fill="#22d3ee" opacity="0.22" filter="url(#soft)"/>
  <ellipse cx="1480" cy="860" rx="320" ry="150" fill="#a78bfa" opacity="0.18" filter="url(#soft)"/>
  <rect x="130" y="120" width="1660" height="840" rx="28" fill="none" stroke="url(#glow)" stroke-width="3" opacity="0.45"/>

  <!-- Left: coding panel -->
  <rect x="230" y="250" width="760" height="560" rx="22" fill="#0b1222" stroke="#334155" stroke-width="3"/>
  <circle cx="270" cy="290" r="10" fill="#fb7185"/>
  <circle cx="305" cy="290" r="10" fill="#fbbf24"/>
  <circle cx="340" cy="290" r="10" fill="#34d399"/>

  <text x="280" y="365" class="code">def reaction_rate(k, Ea, T):</text>
  <text x="315" y="415" class="code">return k * exp(-Ea / (R * T))</text>
  <text x="280" y="485" class="small"># physical organic chemistry + computation</text>
  <text x="280" y="560" class="code">substrate = "aryl bromide"</text>
  <text x="280" y="610" class="code">model = fit_hammett_lfer(data)</text>
  <text x="280" y="680" class="code">print(model.r_squared)</text>

  <!-- Right: chemistry diagram -->
  <g transform="translate(1210 520)">
    <!-- benzene ring -->
    <polygon points="0,-170 147,-85 147,85 0,170 -147,85 -147,-85" fill="none" class="line"/>
    <line x1="-118" y1="-68" x2="-118" y2="68" class="line" opacity="0.75"/>
    <line x1="0" y1="136" x2="118" y2="68" class="line" opacity="0.75"/>
    <line x1="0" y1="-136" x2="118" y2="-68" class="line" opacity="0.75"/>

    <!-- substituents -->
    <line x1="0" y1="-170" x2="0" y2="-250" class="line"/>
    <circle cx="0" cy="-270" r="18" class="atom"/>
    <text x="-12" y="-262" fill="#0f172a" font-family="Arial" font-size="24" font-weight="700">O</text>

    <line x1="147" y1="85" x2="240" y2="140" class="line"/>
    <circle cx="260" cy="152" r="18" class="atom"/>
    <text x="250" y="160" fill="#0f172a" font-family="Arial" font-size="24" font-weight="700">N</text>

    <line x1="-147" y1="85" x2="-250" y2="145" class="line"/>
    <circle cx="-272" cy="158" r="16" class="atom"/>
    <text x="-281" y="166" fill="#0f172a" font-family="Arial" font-size="21" font-weight="700">F</text>
  </g>

  <!-- Reaction arrow -->
  <line x1="1030" y1="830" x2="1510" y2="830" class="line"/>
  <polygon points="1510,830 1468,806 1468,854" fill="#cbd5e1"/>
  <text x="1090" y="790" class="sub">ΔG‡, Hammett ρ, mechanism insights</text>

  <text x="210" y="940" class="label">Coding × Physical Organic Chemistry</text>
  <text x="210" y="985" class="sub">Computational workflows for mechanism-led molecular design</text>
</svg>
